<div class="page">
    <header class="topbar">
      <!-- 🧩 PATTERNS (TOP CENTER) -->
      <div class="patterns">
        <button (click)="selectPattern('custom')" [class.active]="currentPattern === 'custom'" [disabled]="running">
          ✏️ Custom
        </button>

        <button (click)="selectPattern('blinker')" [class.active]="currentPattern === 'blinker'" [disabled]="running">
          🔁 Blinker
        </button>

        <button (click)="selectPattern('glider')" [class.active]="currentPattern === 'glider'" [disabled]="running">
          🚀 Glider
        </button>

        <button (click)="selectPattern('block')" [class.active]="currentPattern === 'block'" [disabled]="running">
          🟦 Block
        </button>
      </div>
    </header>

    <!-- 🎮 BOARD (CENTER) -->
    <main class="board">
      <div class="grid">
        <div *ngFor="let row of grid; let i = index; trackBy: trackByRow" class="row">
          <div *ngFor="let cell of row; let j = index; trackBy: trackByCell" class="cell" [class.alive]="cell"
            (click)="toggleCell(i, j)">
          </div>
        </div>
      </div>
    </main>

    <!-- ▶ CONTROLS (BOTTOM CENTER) -->
    <footer class="footer">
      <button *ngIf="!running" (click)="start()">▶ Start</button>
      <button *ngIf="running" (click)="stop()">⏹ Stop</button>
    </footer>
</div>
