<div class="page">
  <header class="topbar">
    <!-- 🧩 PATTERNS — deux affichages selon la taille d'écran :
         - desktop : les boutons groupés par catégorie (.patterns)
         - mobile  : un menu déroulant maison (.pattern-menu), plus clair
                     qu'un scroll horizontal qu'on pourrait croire "coupé".
         Le CSS n'en montre qu'un seul à la fois (media query). -->
    <div class="patterns">
      <button (click)="selectPattern('custom')" [class.active]="currentPattern === 'custom'">
        ✏️ Custom
      </button>

      <div class="group" *ngFor="let group of groups">
        <span class="group-title">{{ group.title }}</span>
        <div class="group-buttons">
          <button *ngFor="let p of group.patterns" (click)="selectPattern(p.id)"
            [class.active]="currentPattern === p.id">
            {{ p.label }}
          </button>
        </div>
      </div>
    </div>

    <!-- Menu déroulant "maison" (affiché uniquement sur mobile).
         Contrairement à un <select> natif, on maîtrise la hauteur et le
         scroll du panneau ouvert → il ne dépasse jamais de l'écran. -->
    <div class="pattern-menu" #patternMenu>
      <button class="pattern-menu-trigger" (click)="toggleMenu()">
        <span>{{ currentPatternLabel }}</span>
        <span class="caret">▾</span>
      </button>

      <div class="pattern-menu-panel" *ngIf="menuOpen">
        <button class="pattern-menu-item" (click)="pickPattern('custom')"
          [class.active]="currentPattern === 'custom'">
          ✏️ Custom
        </button>

        <div class="pattern-menu-group" *ngFor="let group of groups">
          <span class="pattern-menu-group-title">{{ group.title }}</span>
          <button *ngFor="let p of group.patterns" class="pattern-menu-item"
            (click)="pickPattern(p.id)" [class.active]="currentPattern === p.id">
            {{ p.label }}
          </button>
        </div>
      </div>
    </div>

    <!-- ⚙️ OPTIONS (tore) -->
    <div class="options">
      <button class="toggle" [class.on]="torus" (click)="toggleTorus()">
        🌐 Tore : {{ torus ? 'ON' : 'OFF' }}
      </button>

      <span class="dims-label">{{ rows }} × {{ cols }}</span>
    </div>

    <!-- 📐 BARRE DE DIMENSIONS (mode custom) -->
    <div class="dimensions" *ngIf="isCustomMode">
      <label>
        Lignes : {{ rows }}
        <input type="range" [min]="minSize" [max]="maxSize" [value]="rows"
          (input)="setRows(+$any($event.target).value)" [disabled]="running" />
      </label>
      <label>
        Colonnes : {{ cols }}
        <input type="range" [min]="minSize" [max]="maxSize" [value]="cols"
          (input)="setCols(+$any($event.target).value)" [disabled]="running" />
      </label>
      <button class="clear" (click)="clearGrid()" [disabled]="running">🧹 Effacer</button>
    </div>
  </header>

  <!-- 🎮 BOARD (CENTER) -->
  <main class="board" #board>
    <div class="grid">
      <div *ngFor="let row of grid; let i = index; trackBy: trackByRow" class="row">
        <div *ngFor="let cell of row; let j = index; trackBy: trackByCell" class="cell" [class.alive]="cell"
          [style.width.px]="cellSize" [style.height.px]="cellSize" (click)="toggleCell(i, j)">
        </div>
      </div>
    </div>
  </main>

  <!-- ▶ CONTROLS (BOTTOM CENTER) -->
  <footer class="footer">
    <label class="speed">
      ⏱️ Vitesse : {{ speed }} gén/s
      <input type="range" [min]="minSpeed" [max]="maxSpeed" step="1" [value]="speed"
        (input)="setSpeed(+$any($event.target).value)" />
    </label>

    <button *ngIf="!running" (click)="start()">▶ Start</button>
    <button *ngIf="running" (click)="stop()">⏹ Stop</button>
  </footer>
</div>
